services:
  - type: web
    name: college-carpooling
    runtime: python3
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
    # Note: Add a PostgreSQL database separately in Render dashboard
    # Then add DATABASE_URL environment variable pointing to it