<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - College Carpooling</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header>
        <h1>Admin Panel</h1>
        <nav>
            <a href="{{ url_for('index') }}">Dashboard</a> |
            <a href="{{ url_for('logout') }}">Logout</a>
        </nav>
    </header>

    <main>
        <section class="form-section">
            <h2>Stored User Accounts</h2>
            {% if users %}
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="background-color: #f2f2f2;">
                            <th style="border: 1px solid #ddd; padding: 8px; text-align: left;">ID</th>
                            <th style="border: 1px solid #ddd; padding: 8px; text-align: left;">Username</th>
                            <th style="border: 1px solid #ddd; padding: 8px; text-align: left;">Email</th>
                            <th style="border: 1px solid #ddd; padding: 8px; text-align: left;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for user in users %}
                            <tr>
                                <td style="border: 1px solid #ddd; padding: 8px;">{{ user.id }}</td>
                                <td style="border: 1px solid #ddd; padding: 8px;">{{ user.username }}</td>
                                <td style="border: 1px solid #ddd; padding: 8px;">{{ user.email }}</td>
                                <td style="border: 1px solid #ddd; padding: 8px;">
                                    <form method="POST" action="{{ url_for('delete_user', user_id=user.id) }}" style="display: inline;">
                                        <button type="submit" onclick="return confirm('Are you sure you want to delete this user?')" style="background-color: #f44336; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">Delete</button>
                                    </form>
                                </td>
                            </tr>
                        {% endfor %}
                    </tbody>
                </table>
            {% else %}
                <p>No user accounts found.</p>
            {% endif %}
        </section>
    </main>

    <footer>
        <p>&copy; 2026 College Carpooling Prototype</p>
    </footer>
</body>
</html>
